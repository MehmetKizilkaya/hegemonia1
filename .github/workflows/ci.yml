name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hegemonia
          POSTGRES_PASSWORD: hegemonia_dev
          POSTGRES_DB: hegemonia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build --workspace=@hegemonia/shared
      - run: npm run typecheck --workspace=@hegemonia/api
      - run: npm run typecheck --workspace=@hegemonia/web
      - name: Migrate
        env:
          DATABASE_URL: postgresql://hegemonia:hegemonia_dev@localhost:5432/hegemonia
          DEV_AUTH_BYPASS: true
        run: npm run db:migrate --workspace=@hegemonia/api
